name: Update Apple Music Realtime

on:
  workflow_dispatch:

jobs:
  update-apple:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private repo
        run: |
          git clone https://x-access-token:${{ secrets.PAT_REALTIME }}@github.com/sstsss-sys/apple-music-realtime-private.git

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apple-music-realtime-private
        run: npm install

      - name: Install Playwright
        working-directory: apple-music-realtime-private
        run: npx playwright install chromium --with-deps

      - name: Sync history to private
        run: |
          cp -f us-history.json apple-music-realtime-private/
          cp -f apple-music-history.json apple-music-realtime-private/
          cp -f apple-music-all-history.json apple-music-realtime-private/

      - name: Run Scraper
        working-directory: apple-music-realtime-private
        run: node realtime-apple.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Cek apakah file hasil scrape benar-benar ada sebelum di-copy
          if [ -f "apple-music-realtime-private/apple-music-realtime.json" ]; then
            echo "File ditemukan, melakukan sinkronisasi..."
            cp -f apple-music-realtime-private/apple-music-realtime.json .
            cp -f apple-music-realtime-private/us-history.json .
            cp -f apple-music-realtime-private/apple-music-history.json .
            cp -f apple-music-realtime-private/apple-music-all-history.json .
            
            git add apple-music-realtime.json us-history.json apple-music-history.json apple-music-all-history.json
            
            # Rem Darurat: Cek apakah isi konten benar-benar berubah
            if git diff --cached --quiet; then
              echo "Isi file sama, tidak ada yang perlu di-push."
            else
              git commit -m "Auto Update: Scrape Success"
              git push
            fi
          else
            echo "Tidak ada file baru (Scraper tidak melakukan update). Selesai dengan sukses (Hijau)."
            exit 0
          fi
          
