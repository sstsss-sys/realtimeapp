name: Update Apple Music Realtime

on:
  workflow_dispatch:

jobs:
  update-apple:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Etalase (Public)
        uses: actions/checkout@v4

      - name: Checkout Dapur (Private)
        uses: actions/checkout@v4
        with:
          repository: sstsss-sys/apple-music-realtime-private
          path: apple-music-realtime-private
          token: ${{ secrets.PAT_REALTIME }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apple-music-realtime-private
        run: npm install

      - name: Install Playwright
        working-directory: apple-music-realtime-private
        run: npx playwright install chromium --with-deps

      - name: Copy existing JSON from Etalase
        run: |
          cp -f *.json apple-music-realtime-private/ || true

      - name: Run Scraper
        working-directory: apple-music-realtime-private
        run: node realtime-apple.js

      - name: Move result to Etalase
        run: |
          # Hanya copy file yang ingin dipublikasikan ke Etalase
          cp -f apple-music-realtime-private/apple-music-realtime.json .
          # Opsional: tambahkan file lain jika perlu

      - name: Commit and Push to Etalase
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --staged --quiet || git commit -m "Update Apple Music data"
          git push
          
