name: Update Apple Music Realtime

on:
  workflow_dispatch:

jobs:
  update-apple:
    runs-on: ubuntu-latest
    # PROTEKSI: Memastikan tidak ada antrean job yang saling bertabrakan
    concurrency:
      group: apple-music-sync
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Checkout Etalase (Public)
        uses: actions/checkout@v4

      - name: Checkout Dapur (Private)
        uses: actions/checkout@v4
        with:
          repository: sstsss-sys/apple-music-realtime-private
          path: apple-music-realtime-private
          token: ${{ secrets.PAT_REALTIME }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apple-music-realtime-private
        run: npm install

      - name: Install Playwright
        working-directory: apple-music-realtime-private
        run: npx playwright install chromium --with-deps

      # LANGKAH KRUSIAL: Pindahkan history dari repo publik ke repo privat sebelum skrip jalan
      - name: Sync History to Dapur
        run: |
          cp -f us-history.json apple-music-realtime-private/ || echo "us-history.json not found"
          cp -f apple-music-history.json apple-music-realtime-private/ || echo "apple-music-history.json not found"

      # Jalankan skrip. Jika oldUs === newUs, skrip akan melakukan return dan berhenti.
      - name: Run Scraper
        working-directory: apple-music-realtime-private
        run: node realtime-apple.js

      # Pindahkan kembali hasil update ke repo publik
      - name: Move Results back to Etalase
        run: |
          cp -f apple-music-realtime-private/apple-music-realtime.json .
          cp -f apple-music-realtime-private/us-history.json .
          cp -f apple-music-realtime-private/apple-music-history.json .

      # Commit dan Push hanya jika terjadi perubahan pada file JSON
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --staged --quiet || (git commit -m "Update: Data scraped via cron-job" && git push)
          
